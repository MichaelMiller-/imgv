image:
  - Visual Studio 2019

clone_folder: c:\projects\source

cache: c:\tools\vcpkg\installed

install:
  - cd c:\tools\vcpkg
  - git pull
  - .\bootstrap-vcpkg.bat

build_script:
  - mkdir c:\projects\source\_build
  - cd c:\projects\source\_build
  - cmake -G "Visual Studio 17" -DCMAKE_TOOLCHAIN_FILE=c:/tools/vcpkg/scripts/buildsystems/vcpkg.cmake ..
  - cmake --build . 

test_script:
  - ctest -C Debug
  - ctest -C Debug --rerun-failed --output-on-failure
